<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Andrea Spinazzola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script>(function(){const t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;})()</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --fg:#111111; --fg2:#888888; --fg3:#cccccc; --border:#e4e4e4;
  --h:48px; --pp:48px; --pp-mob:20px;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{ --bg:#0d0d0d; --fg:#efefef; --fg2:#666666; --fg3:#2a2a2a; --border:#1e1e1e; }
html{ height:100%; background:var(--bg); }
body{
  height:100%; font-family:'Hanken Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--fg);
  -webkit-user-select:none; user-select:none;
  overflow:hidden; transition:background .4s,color .4s;
  -webkit-tap-highlight-color:transparent;
}

/* HEADER */
header{
  position:fixed; top:0; left:0; right:0; z-index:900; height:var(--h);
  display:flex; align-items:center; padding:0 20px;
  background:transparent; border-bottom:1px solid transparent;
  transition:background .45s,border-color .45s;
}
header.solid{ background:var(--bg); border-bottom-color:var(--border); }
.h-name{ font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#fff; margin-right:auto; transition:color .4s; white-space:nowrap; }
header.solid .h-name{ color:var(--fg); }
nav{ display:flex; align-items:stretch; height:var(--h); }
nav a{
  font-size:10px; font-weight:400; letter-spacing:.13em; text-transform:uppercase;
  color:rgba(255,255,255,.6); text-decoration:none;
  display:flex; align-items:center; padding:0 14px;
  border-bottom:1px solid transparent; margin-bottom:-1px;
  transition:color .2s,border-color .2s; white-space:nowrap;
}
nav a:hover,nav a.active{ color:#fff; }
nav a.active{ border-bottom-color:rgba(255,255,255,.55); }
header.solid nav a{ color:var(--fg2); }
header.solid nav a:hover,header.solid nav a.active{ color:var(--fg); }
header.solid nav a.active{ border-bottom-color:var(--fg); }
@media(max-width:540px){ nav a:not(.active){display:none;} nav a.active{padding:0 10px;} }
.h-right{ display:flex; align-items:center; margin-left:8px; padding-left:14px; border-left:1px solid rgba(255,255,255,.18); height:var(--h); transition:border-color .4s; }
header.solid .h-right{ border-left-color:var(--border); }
.theme-btn{ background:none; border:none; cursor:pointer; width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.6); padding:0; transition:color .2s; touch-action:manipulation; }
.theme-btn:hover,header.solid .theme-btn:hover{ color:var(--fg); }
header.solid .theme-btn{ color:var(--fg2); }
.theme-btn svg{ width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }

/* HERO */
.hero{ position:fixed; inset:0; z-index:0; }
#hero-canvas,#hero-canvas-b{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
#hero-canvas-b{ opacity:0; }
.hero-overlay{ position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.65) 0%,rgba(0,0,0,.15) 50%,rgba(0,0,0,.06) 100%); pointer-events:none; }
.hero-content{ position:absolute; bottom:0; left:0; right:0; padding:0 6vw clamp(28px,5vw,56px); }
.hero-series{ font-family:'Space Mono',monospace; font-size:clamp(7px,1.8vw,9px); letter-spacing:.32em; text-transform:uppercase; color:rgba(255,255,255,.5); margin-bottom:10px; }
.hero-title{ font-weight:700; font-size:clamp(3.8rem,13vw,12.5rem); line-height:.88; color:#fff; text-transform:uppercase; letter-spacing:-.02em; margin-bottom:clamp(20px,3.5vw,48px); }
.hero-enter{ display:inline-flex; align-items:center; gap:10px; font-size:clamp(9px,1.8vw,11px); font-weight:500; letter-spacing:.22em; text-transform:uppercase; color:rgba(255,255,255,.65); cursor:pointer; border:none; background:none; padding:0; transition:color .2s; touch-action:manipulation; }
.hero-enter:hover{ color:#fff; }
.hero-enter svg{ width:13px; height:13px; fill:none; stroke:currentColor; stroke-width:1.4; stroke-linecap:round; stroke-linejoin:round; }
.hero-dots{ position:absolute; bottom:clamp(14px,2.5vw,26px); right:clamp(16px,3vw,28px); display:flex; gap:6px; z-index:5; }
.hero-dot{ width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,.3); cursor:pointer; transition:background .3s,transform .3s; touch-action:manipulation; }
.hero-dot.active{ background:#fff; transform:scale(1.5); }

/* OVERLAY BASE — gallery, contact share this */
.gallery-overlay,.contact-overlay{
  position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column;
  opacity:0; transform:translateY(24px); pointer-events:none; visibility:hidden;
  transition:opacity .38s var(--ease),transform .38s var(--ease),background .4s,visibility 0s linear .38s;
}
.gallery-overlay{ z-index:200; }
.contact-overlay{ z-index:200; }
.gallery-overlay.open,.contact-overlay.open{
  opacity:1; transform:translateY(0); pointer-events:auto; visibility:visible;
  transition:opacity .38s var(--ease),transform .38s var(--ease),background .4s,visibility 0s linear 0s;
}

/* GALLERY */
.gallery-header,.contact-header{
  height:var(--h); flex-shrink:0; display:flex; align-items:center;
  padding:0 20px; border-bottom:1px solid var(--border); transition:border-color .4s; gap:16px;
}
.g-back{
  font-size:10px; font-weight:400; letter-spacing:.15em; text-transform:uppercase;
  color:var(--fg2); background:none; border:none; cursor:pointer;
  display:flex; align-items:center; gap:7px; transition:color .2s; touch-action:manipulation; padding:8px 0;
}
.g-back:hover{ color:var(--fg); }
.g-back svg{ width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
.g-header-name{ font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--fg); margin:0 auto; }
.gallery-wall{
  flex:1; display:grid; grid-template-columns:repeat(12,1fr); grid-template-rows:56% 44%;
  gap:1px; background:var(--border); overflow:hidden; transition:background .4s;
}
@media(max-width:700px){
  .gallery-wall{ grid-template-columns:1fr; grid-template-rows:none; grid-auto-rows:56vw; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  .g-item:nth-child(n){ grid-column:1/-1!important; grid-row:auto!important; }
}
.g-item{ position:relative; overflow:hidden; background:var(--bg); transition:background .4s; }
.g-item:nth-child(1){ grid-column:1/8; grid-row:1/2; }
.g-item:nth-child(2){ grid-column:8/13; grid-row:1/2; }
.g-item:nth-child(3){ grid-column:1/5; grid-row:2/3; }
.g-item:nth-child(4){ grid-column:5/13; grid-row:2/3; }
.g-item canvas{ width:100%; height:100%; display:block; pointer-events:none; will-change:transform; transform-origin:center; transition:transform 1.1s var(--ease); }
.g-item .g-hit{ position:absolute; inset:0; z-index:2; cursor:none; }
@media(hover:hover){ .g-item:hover canvas{ transform:scale(1.06); } }
.g-caption{
  position:absolute; bottom:0; left:0; right:0; z-index:3;
  padding:52px 18px 18px;
  background:linear-gradient(to top,rgba(0,0,0,.68) 0%,transparent 100%);
  display:flex; align-items:flex-end; justify-content:space-between;
  opacity:0; transform:translateY(12px);
  transition:opacity .45s var(--ease),transform .45s var(--ease); pointer-events:none;
}
@media(hover:hover){ .g-item:hover .g-caption{ opacity:1; transform:translateY(0); } }
@media(hover:none){ .g-caption{ opacity:1; transform:translateY(0); padding-bottom:14px; } }
.g-caption-title{ font-size:12px; font-weight:500; letter-spacing:.05em; color:#fff; }
.g-caption-index{ font-family:'Space Mono',monospace; font-size:8px; letter-spacing:.2em; color:rgba(255,255,255,.45); text-transform:uppercase; }
.series-bar{ height:36px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:0 20px; border-top:1px solid var(--border); transition:border-color .4s; }
.series-bar-title{ font-size:10px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--fg); }
.series-bar-meta{ font-family:'Space Mono',monospace; font-size:8px; letter-spacing:.18em; color:var(--fg2); text-transform:uppercase; }
@media(max-width:480px){ .series-bar-meta{ display:none; } }

/* CONTACT */
.contact-overlay{ -webkit-user-select:text; user-select:text; }
.contact-body{ flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; overflow-y:auto; }
.contact-inner{ position:relative; width:100%; max-width:520px; border:1px solid var(--border); padding:40px; transition:border-color .4s; }
.contact-close{
  position:absolute; top:16px; right:16px;
  width:32px; height:32px;
  background:none; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--fg2); transition:color .2s; touch-action:manipulation;
}
.contact-close:hover{ color:var(--fg); }
.contact-close svg{ width:13px; height:13px; fill:none; stroke:currentColor; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
.contact-label{ font-family:'Space Mono',monospace; font-size:8px; letter-spacing:.28em; text-transform:uppercase; color:var(--fg2); margin-bottom:32px; }
.contact-form{ display:flex; flex-direction:column; gap:0; }
.form-field{ display:flex; flex-direction:column; gap:6px; border-bottom:1px solid var(--border); padding:18px 0; transition:border-color .2s; }
.form-field:focus-within{ border-bottom-color:var(--fg); }
.form-field label{ font-family:'Space Mono',monospace; font-size:7.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--fg2); transition:color .2s; -webkit-user-select:none; user-select:none; }
.form-field:focus-within label{ color:var(--fg); }
.form-field input,.form-field textarea{ background:none; border:none; outline:none; font-family:'Hanken Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:14px; font-weight:400; color:var(--fg); width:100%; resize:none; padding:0; -webkit-user-select:text; user-select:text; }
.form-field input::placeholder,.form-field textarea::placeholder{ color:var(--fg3); }
.form-field textarea{ min-height:100px; line-height:1.6; }
.form-submit{ margin-top:32px; display:flex; align-items:center; justify-content:space-between; }
.form-btn{ background:none; border:none; cursor:pointer; font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--fg2); display:flex; align-items:center; gap:10px; padding:0; transition:color .2s; touch-action:manipulation; }
.form-btn:hover{ color:var(--fg); }
.form-btn svg{ width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:1.4; stroke-linecap:round; stroke-linejoin:round; transition:transform .3s var(--ease); }
.form-btn:hover svg{ transform:translateX(4px); }
.form-btn.loading svg{ animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }
.form-status{ font-family:'Space Mono',monospace; font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:var(--fg2); opacity:0; transition:opacity .3s; }
.form-status.visible{ opacity:1; }
.form-status.ok{ color:#4a9; }
.form-status.err{ color:#c55; }

/* CURSOR */
.custom-cursor{ position:fixed; top:0; left:0; width:40px; height:40px; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); opacity:0; transition:opacity .18s; }
.custom-cursor.visible{ opacity:1; }
.custom-cursor.pressed{ transform:translate(-50%,-50%) scale(.72); }

/* ═══════════════════════════════════════════════════════
   MUSEUM — standalone fullscreen layer, own header
   ═══════════════════════════════════════════════════════ */
.museum{
  position:fixed; inset:0; z-index:800;
  background:var(--bg); display:flex; flex-direction:column;
  opacity:0; transform:translateY(24px); pointer-events:none; visibility:hidden;
  transition:opacity .38s var(--ease),transform .38s var(--ease),background .4s,visibility 0s linear .38s;
}
.museum.open{
  opacity:1; transform:translateY(0); pointer-events:auto; visibility:visible;
  transition:opacity .38s var(--ease),transform .38s var(--ease),background .4s,visibility 0s linear 0s;
}
.museum-top{
  height:var(--h); flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; border-bottom:1px solid var(--border); transition:border-color .4s;
}
.museum-counter{ font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.22em; color:var(--fg2); text-transform:uppercase; }
.m-btn{ background:none; border:none; color:var(--fg2); cursor:pointer; width:36px; height:36px; display:flex; align-items:center; justify-content:center; transition:color .15s; touch-action:manipulation; }
.m-btn:hover{ color:var(--fg); }
.m-btn svg{ width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }

/* Stage: just a container, no padding */
.museum-stage{ flex:1; position:relative; overflow:hidden; }

/* The actual photo canvas — positioned by JS, never moves during animation */
#museum-canvas{ position:absolute; display:block; cursor:zoom-in; }
#museum-canvas.zoomed{ cursor:grab; }
#museum-canvas.grabbing{ cursor:grabbing; }

/* Copyright and reset: siblings of canvas, positioned by JS once on layout */
.museum-wm{
  position:absolute; pointer-events:none;
  font-family:'Space Mono',monospace; font-size:7px; letter-spacing:.2em;
  color:var(--fg2); text-transform:uppercase; opacity:.45;
  white-space:nowrap;
}
.museum-reset{
  position:absolute;
  background:none; border:none; color:var(--fg2); cursor:pointer;
  width:24px; height:24px; display:flex; align-items:center; justify-content:center;
  padding:0; opacity:0; pointer-events:none; transition:opacity .2s,color .2s;
  touch-action:manipulation;
}
.museum-reset.visible{ opacity:.45; pointer-events:auto; }
.museum-reset:hover{ opacity:1; color:var(--fg); }
.museum-reset svg{ width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:1.4; stroke-linecap:round; stroke-linejoin:round; }

/* Side arrows — in stage, not related to image */
.m-arrow{
  position:absolute; top:50%; transform:translateY(-50%); z-index:20;
  background:none; border:none; color:var(--fg); cursor:pointer;
  width:56px; height:56px; display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .25s; pointer-events:none; touch-action:manipulation;
}
.m-arrow svg{ width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:1.2; stroke-linecap:round; stroke-linejoin:round; }
.m-arrow-left{ left:4px; } .m-arrow-right{ right:4px; }
.m-arrow.visible{ opacity:.3; pointer-events:auto; }
.m-arrow:hover{ opacity:1; }
@media(hover:none){ .m-arrow{ opacity:.25!important; pointer-events:auto!important; } }

/* Caption bar */
.museum-caption{ flex-shrink:0; min-height:52px; display:flex; align-items:center; padding:10px 20px; border-top:1px solid var(--border); gap:24px; transition:border-color .4s; flex-wrap:wrap; }
.caption-title{ font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--fg); white-space:nowrap; flex-shrink:0; }
.caption-body{ display:flex; align-items:baseline; gap:24px; flex:1; min-width:0; }
.caption-desc{ font-size:9px; font-weight:400; line-height:1.55; color:var(--fg2); letter-spacing:.01em; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.caption-meta{ font-family:'Space Mono',monospace; font-size:7.5px; letter-spacing:.18em; color:var(--fg3); text-transform:uppercase; line-height:1.9; white-space:nowrap; flex-shrink:0; }
@media(max-width:480px){ .caption-body{flex-direction:column;gap:4px;} .caption-meta{display:none;} }
</style>
</head>
<body>
<div class="custom-cursor" id="customCursor"></div>

<header id="mainHeader">
  <div class="h-name">Andrea Spinazzola</div>
  <nav>
    <a href="#" class="active" id="navWork">Work</a>
    <a href="#" id="navSeries" onclick="return false;">Series</a>
    <a href="#" id="navAbout" onclick="return false;">About</a>
    <a href="#" id="navContact">Contact</a>
  </nav>
  <div class="h-right">
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</header>

<div class="hero" id="heroSection">
  <canvas id="hero-canvas-b"></canvas>
  <canvas id="hero-canvas"></canvas>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-series" id="heroSeries">Series I &mdash; Faces &middot; AI Generative &middot; 2024</div>
    <div class="hero-title" id="heroTitle">Human Frequency</div>
    <button class="hero-enter" id="heroEnter">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      View Series
    </button>
  </div>
  <div class="hero-dots" id="heroDots"></div>
</div>

<div class="gallery-overlay" id="galleryOverlay">
  <div class="gallery-header">
    <button class="g-back" id="galleryBack" aria-label="Back to home"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Back</button>
    <div class="g-header-name">Andrea Spinazzola</div>
    <div style="width:60px"></div>
  </div>
  <div class="gallery-wall" id="galleryWall"></div>
  <div class="series-bar">
    <span class="series-bar-title" id="seriesBarTitle">Series I &mdash; Faces</span>
    <span class="series-bar-meta" id="seriesBarMeta">AI Generative &middot; 2024</span>
  </div>
</div>

<div class="contact-overlay" id="contactOverlay">
  <div class="contact-header">
    <div style="width:60px"></div>
    <div class="g-header-name">Andrea Spinazzola</div>
    <div style="width:60px"></div>
  </div>
  <div class="contact-body">
    <div class="contact-inner">
      <button class="contact-close" id="contactBack" aria-label="Close contact"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="contact-label">Get in touch</div>
      <form class="contact-form" id="contactForm" novalidate>
        <div class="form-field"><label for="cf-name">Name</label><input id="cf-name" name="name" type="text" placeholder="Your name" autocomplete="name" required></div>
        <div class="form-field"><label for="cf-email">Email</label><input id="cf-email" name="email" type="email" placeholder="your@email.com" autocomplete="email" required></div>
        <div class="form-field"><label for="cf-message">Message</label><textarea id="cf-message" name="message" placeholder="Write your message&hellip;" required></textarea></div>
        <div class="form-submit">
          <button class="form-btn" id="formSubmitBtn" type="submit">Send<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
          <span class="form-status" id="formStatus"></span>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="museum" id="museum">
  <div class="museum-top">
    <div style="width:36px"></div>
    <div class="museum-counter" id="museumCounter">01 / 02</div>
    <button class="m-btn" id="mClose" aria-label="Close"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="museum-stage" id="museumStage">
    <canvas id="museum-canvas"></canvas>
    <div class="museum-wm">&copy; Andrea Spinazzola</div>
    <button class="museum-reset" id="museumReset" aria-label="Reset zoom"><svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
    <button class="m-arrow m-arrow-left"  id="mPrev" aria-label="Previous image"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="m-arrow m-arrow-right" id="mNext" aria-label="Next image"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
  <div class="museum-caption">
    <div class="caption-title" id="captionTitle">&mdash;</div>
    <div class="caption-body">
      <div class="caption-desc" id="captionDesc">&mdash;</div>
      <div class="caption-meta" id="captionMeta">&mdash;</div>
    </div>
  </div>
</div>

<script>

let IMAGES = [];
let loadedImgs = [];


// PROTECTION
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('dragstart',   e => e.preventDefault());
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if ((e.ctrlKey||e.metaKey) && ['s','u','p'].includes(k)) e.preventDefault();
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && ['i','j','c'].includes(k)) e.preventDefault();
  if (['F12','PrintScreen'].includes(e.key)) e.preventDefault();
});

// THEME
const html = document.documentElement;
const themeBtn  = document.getElementById('themeBtn');
const themeIcon = document.getElementById('themeIcon');
const SUN  = '<circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>';
const MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
// Sync icon with saved theme on init
themeIcon.innerHTML = html.dataset.theme === 'dark' ? MOON : SUN;
themeBtn.addEventListener('click', () => {
  const dark = html.dataset.theme === 'dark';
  html.dataset.theme = dark ? 'light' : 'dark';
  localStorage.setItem('theme', dark ? 'light' : 'dark');
  themeIcon.innerHTML = dark ? SUN : MOON;
  updateCursorColor();
});

// CURSOR
const cursor = document.getElementById('customCursor');
function buildCursor(color) {
  const dpr = Math.max(window.devicePixelRatio || 1, 2);
  const cv = document.createElement('canvas');
  const px = 40 * dpr; cv.width = cv.height = px;
  const ctx = cv.getContext('2d'), cx = px / 2;
  ctx.clearRect(0, 0, px, px);
  ctx.beginPath(); ctx.arc(cx, cx, 13 * dpr, 0, Math.PI * 2);
  ctx.strokeStyle = color; ctx.lineWidth = 1.1 * dpr; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cx, 2.6 * dpr, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  return cv.toDataURL('image/png');
}
function updateCursorColor() {
  const c = html.dataset.theme === 'dark' ? 'rgba(239,239,239,0.9)' : 'rgba(17,17,17,0.85)';
  cursor.style.backgroundImage = 'url(' + buildCursor(c) + ')';
  cursor.style.backgroundSize = '100% 100%';
}
function cursorEnter(x, y) { cursor.style.left = x+'px'; cursor.style.top = y+'px'; cursor.classList.add('visible'); }
function cursorMove(x, y)  { cursor.style.left = x+'px'; cursor.style.top = y+'px'; }
function cursorLeave()     { cursor.classList.remove('visible'); }
updateCursorColor();

// HERO
const heroCanvasA = document.getElementById('hero-canvas');
const heroCanvasB = document.getElementById('hero-canvas-b');
const heroDots    = document.getElementById('heroDots');
let heroIdx = 0, heroTimer = null;

function drawHero(cv, img) {
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const s = Math.max(cv.width/img.naturalWidth, cv.height/img.naturalHeight);
  const sw = img.naturalWidth*s, sh = img.naturalHeight*s;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.drawImage(img, (cv.width-sw)/2, (cv.height-sh)/2, sw, sh);
}
function buildHeroDots() {
  heroDots.innerHTML = '';
  IMAGES.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'hero-dot'+(i===0?' active':'');
    d.addEventListener('click', () => goToSlide(i));
    heroDots.appendChild(d);
  });
}
function updateDots() {
  heroDots.querySelectorAll('.hero-dot').forEach((d,i) => d.classList.toggle('active', i===heroIdx));
}
function goToSlide(idx) {
  if (idx===heroIdx) return;
  heroIdx = idx;
  const next = loadedImgs[idx];
  const go = () => {
    drawHero(heroCanvasB, next);
    heroCanvasB.style.transition = 'none'; heroCanvasB.style.opacity = '0';
    requestAnimationFrame(() => {
      heroCanvasB.style.transition = 'opacity 1.2s ease'; heroCanvasB.style.opacity = '1';
      setTimeout(() => {
        drawHero(heroCanvasA, next);
        heroCanvasB.style.transition = 'none'; heroCanvasB.style.opacity = '0';
        updateDots();
      }, 1250);
    });
  };
  if (next.complete) go(); else next.onload = go;
}
function startTimer() { clearInterval(heroTimer); if (IMAGES.length <= 1) return; heroTimer = setInterval(() => goToSlide((heroIdx+1)%IMAGES.length), 5000); }
function initHero() {
  const img = loadedImgs[0];
  if (img.complete) drawHero(heroCanvasA, img); else img.onload = () => drawHero(heroCanvasA, img);
  updateDots(); startTimer();
}
let _heroResizeTimer;
window.addEventListener('resize', () => { clearTimeout(_heroResizeTimer); _heroResizeTimer = setTimeout(() => { if (loadedImgs.length) drawHero(heroCanvasA, loadedImgs[heroIdx]); }, 150); });

// Hero touch swipe
let _heroTouchX = 0;
document.getElementById('heroSection').addEventListener('touchstart', e => { _heroTouchX = e.touches[0].clientX; }, {passive:true});
document.getElementById('heroSection').addEventListener('touchend', e => {
  if (IMAGES.length <= 1) return;
  const dx = e.changedTouches[0].clientX - _heroTouchX;
  if (Math.abs(dx) > 50) dx < 0 ? goToSlide((heroIdx+1)%IMAGES.length) : goToSlide((heroIdx-1+IMAGES.length)%IMAGES.length);
}, {passive:true});

// GALLERY
const galleryOverlay = document.getElementById('galleryOverlay');
const mainHeader     = document.getElementById('mainHeader');
const galleryWall    = document.getElementById('galleryWall');

function setNav(active) {
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  if (active) active.classList.add('active');
}
function openGallery()  { if (museum.classList.contains('open')) closeMuseum(); galleryOverlay.classList.add('open'); mainHeader.classList.add('solid'); clearInterval(heroTimer); setNav(document.getElementById('navWork')); }
function closeGallery() { galleryOverlay.classList.remove('open'); if (!contactOverlay.classList.contains('open')) mainHeader.classList.remove('solid'); startTimer(); setNav(document.getElementById('navWork')); }

document.getElementById('heroEnter').addEventListener('click', openGallery);
document.getElementById('galleryBack').addEventListener('click', closeGallery);
document.getElementById('navWork').addEventListener('click', e => { e.preventDefault(); galleryOverlay.classList.contains('open') ? closeGallery() : openGallery(); });

function buildGalleryGrid() {
  galleryWall.innerHTML = '';
  IMAGES.forEach((data,i) => {
    const item = document.createElement('div'); item.className = 'g-item';
    const cv   = document.createElement('canvas');
    const cap  = document.createElement('div'); cap.className = 'g-caption';
    const capTitle = document.createElement('span'); capTitle.className = 'g-caption-title'; capTitle.textContent = data.title;
    const capIdx   = document.createElement('span'); capIdx.className   = 'g-caption-index'; capIdx.textContent   = 'No.'+String(i+1).padStart(2,'0');
    cap.appendChild(capTitle); cap.appendChild(capIdx);
    const hit = document.createElement('div'); hit.className = 'g-hit';
    item.appendChild(cv); item.appendChild(cap); item.appendChild(hit);
    galleryWall.appendChild(item);
    hit.addEventListener('mousemove',  e => cursorMove(e.clientX, e.clientY));
    hit.addEventListener('mouseenter', e => cursorEnter(e.clientX, e.clientY));
    hit.addEventListener('mouseleave', cursorLeave);
    hit.addEventListener('mousedown',  () => cursor.classList.add('pressed'));
    hit.addEventListener('mouseup',    () => cursor.classList.remove('pressed'));
    hit.addEventListener('click',      () => openMuseum(i));
    const img = loadedImgs[i];
    const paint = () => {
      if (!item.clientWidth || !item.clientHeight) return;
      cv.width = item.clientWidth; cv.height = item.clientHeight;
      const ctx = cv.getContext('2d');
      const s = Math.max(cv.width/img.naturalWidth, cv.height/img.naturalHeight);
      const sw = img.naturalWidth*s, sh = img.naturalHeight*s;
      ctx.clearRect(0,0,cv.width,cv.height);
      ctx.drawImage(img, (cv.width-sw)/2, (cv.height-sh)/2, sw, sh);
    };
    if (img.complete) paint(); else img.onload = paint;
    new ResizeObserver(paint).observe(item);
  });
}

// ═══════════════════════════════════════════════════
// MUSEUM
// Architecture:
//   .museum-stage  (position:relative, overflow:hidden)
//     #museum-canvas  (position:absolute) — draws image
//     .museum-wm      (position:absolute) — copyright, positioned once per layout
//     .museum-reset   (position:absolute) — reset btn, positioned once per layout
//     .m-arrow x2     (position:absolute) — navigation
// Nothing inside the canvas ever moves. Canvas position itself is set by JS.
// Copyright/reset are anchored to image edges via JS, updated only on
// renderMuseum() (not during animation frames).
// ═══════════════════════════════════════════════════

const museum     = document.getElementById('museum');
const mStage     = document.getElementById('museumStage');
const mCanvas    = document.getElementById('museum-canvas');
const mCtx       = mCanvas.getContext('2d');
const mWM        = document.querySelector('.museum-wm');
const mReset     = document.getElementById('museumReset');
const mCounter   = document.getElementById('museumCounter');
const mPrev      = document.getElementById('mPrev');
const mNext      = document.getElementById('mNext');
const mClose     = document.getElementById('mClose');

let mImg = null, mIdx = 0;
let isZoomed = false, panX = 0, panY = 0;
let isDragging = false, lastX = 0, lastY = 0, didPan = false;
let slideAnim = null;
const PP = () => window.innerWidth <= 700 ? 20 : 48;

// Offscreen for crossfade
const offCanvas = document.createElement('canvas');
const offCtx    = offCanvas.getContext('2d');

// Arrow proximity
let arrowTimer = null;
mStage.addEventListener('mousemove', e => {
  const r = mStage.getBoundingClientRect(), x = e.clientX-r.left, w = mStage.clientWidth;
  mPrev.classList.toggle('visible', x < w*0.22);
  mNext.classList.toggle('visible', x > w*0.78);
  clearTimeout(arrowTimer);
  arrowTimer = setTimeout(() => { mPrev.classList.remove('visible'); mNext.classList.remove('visible'); }, 2000);
});
mStage.addEventListener('mouseleave', () => { mPrev.classList.remove('visible'); mNext.classList.remove('visible'); });

// Canvas cursor
mCanvas.addEventListener('mouseenter', e => { if (!isZoomed) cursorEnter(e.clientX, e.clientY); });
mCanvas.addEventListener('mousemove',  e => { if (!isZoomed) cursorMove(e.clientX, e.clientY); else cursorLeave(); });
mCanvas.addEventListener('mouseleave', cursorLeave);
mCanvas.addEventListener('mousedown',  () => { if (!isZoomed) cursor.classList.add('pressed'); });
mCanvas.addEventListener('mouseup',    () => cursor.classList.remove('pressed'));

// ── anchorUI ──────────────────────────────────────
// Positions copyright and reset OUTSIDE the canvas, in stage coords.
// Called once after each layout change (image load / resize / zoom toggle).
// NOT called during animation frames.
function anchorUI(canvasLeft, canvasTop, canvasW, canvasH) {
  const GAP = 9; // px below image bottom edge
  const top = canvasTop + canvasH + GAP;
  mWM.style.left = canvasLeft + 'px';
  mWM.style.top  = top + 'px';
  mReset.style.right = (mStage.clientWidth - canvasLeft - canvasW) + 'px';
  mReset.style.top   = (top - 4) + 'px'; // optical centre with text
}

// ── renderMuseum ──────────────────────────────────
function renderMuseum() {
  if (!mImg) return;
  const sw = mStage.clientWidth, sh = mStage.clientHeight;
  const pp = PP();
  const iw = mImg.naturalWidth, ih = mImg.naturalHeight;

  if (!isZoomed) {
    // FIT: scale image to fit inside passepartout
    const s  = Math.min((sw-pp*2)/iw, (sh-pp*2)/ih);
    const dw = Math.round(iw*s), dh = Math.round(ih*s);
    const cx = Math.round((sw-dw)/2), cy = Math.round((sh-dh)/2);
    // Size and position canvas to exactly match the drawn image
    mCanvas.width  = dw; mCanvas.height = dh;
    mCanvas.style.width  = dw+'px'; mCanvas.style.height = dh+'px';
    mCanvas.style.left   = cx+'px'; mCanvas.style.top    = cy+'px';
    mCtx.clearRect(0, 0, dw, dh);
    mCtx.drawImage(mImg, 0, 0, dw, dh);
    // Store for zoom math
    mCanvas._s=s; mCanvas._cx=cx; mCanvas._cy=cy; mCanvas._dw=dw; mCanvas._dh=dh;
    mCanvas.className = '';
    mReset.classList.remove('visible');
    // Anchor copyright/reset to image edges — only here, never during anim
    anchorUI(cx, cy, dw, dh);
  } else {
    // ZOOM 1:1: canvas = full stage, image drawn at native size with pan
    mCanvas.width  = sw; mCanvas.height = sh;
    mCanvas.style.width  = sw+'px'; mCanvas.style.height = sh+'px';
    mCanvas.style.left   = '0px';  mCanvas.style.top    = '0px';
    const maxPX = Math.max(0, (iw-sw)/2);
    const maxPY = Math.max(0, (ih-sh)/2);
    panX = Math.max(-maxPX, Math.min(maxPX, panX));
    panY = Math.max(-maxPY, Math.min(maxPY, panY));
    mCtx.clearRect(0, 0, sw, sh);
    mCtx.drawImage(mImg, Math.round((sw-iw)/2+panX), Math.round((sh-ih)/2+panY), iw, ih);
    mCanvas.className = isDragging ? 'grabbing' : 'zoomed';
    mReset.classList.add('visible');
    // In zoom mode anchor reset to bottom-right of stage
    mWM.style.left = '20px'; mWM.style.top = (sh-24)+'px';
    mReset.style.right = '16px'; mReset.style.top = (sh-30)+'px';
  }
}

// ── slideToImage ──────────────────────────────────
function slideToImage(idx, dir) {
  const nextImg = loadedImgs[idx];
  const go = () => {
    if (slideAnim) { cancelAnimationFrame(slideAnim); slideAnim = null; }
    // Snapshot current canvas at its current dimensions
    const cw = mCanvas.width, ch = mCanvas.height;
    offCanvas.width = cw; offCanvas.height = ch;
    offCtx.clearRect(0, 0, cw, ch);
    offCtx.drawImage(mCanvas, 0, 0);
    // Compute next image's fit geometry using SAME canvas size
    const iw2 = nextImg.naturalWidth, ih2 = nextImg.naturalHeight;
    const s2  = Math.min(cw/iw2, ch/ih2);
    const dw2 = Math.round(iw2*s2), dh2 = Math.round(ih2*s2);
    const SHIFT = Math.round(cw*0.04), DUR = 480;
    let start = null;
    function easeOut(t) { return 1-Math.pow(1-t,3); }
    function frame(ts) {
      if (!start) start = ts;
      const t = Math.min((ts-start)/DUR, 1), e = easeOut(t);
      mCtx.clearRect(0, 0, cw, ch);
      mCtx.save(); mCtx.globalAlpha = 1-e;
      mCtx.drawImage(offCanvas, Math.round(-dir*SHIFT*e), 0);
      mCtx.restore();
      mCtx.save(); mCtx.globalAlpha = e;
      mCtx.drawImage(nextImg, Math.round((cw-dw2)/2+dir*SHIFT*(1-e)), Math.round((ch-dh2)/2), dw2, dh2);
      mCtx.restore();
      if (t<1) { slideAnim = requestAnimationFrame(frame); }
      else {
        mIdx = idx; mImg = nextImg; slideAnim = null;
        mCounter.textContent = String(idx+1).padStart(2,'0')+' / '+String(IMAGES.length).padStart(2,'0');
        document.getElementById('captionTitle').textContent = IMAGES[idx].title;
        document.getElementById('captionDesc').textContent  = IMAGES[idx].desc;
        document.getElementById('captionMeta').textContent  = IMAGES[idx].meta;
        renderMuseum();
      }
    }
    slideAnim = requestAnimationFrame(frame);
  };
  if (nextImg.complete) go(); else nextImg.onload = go;
}

// ── zoomToPoint ───────────────────────────────────
// In fit mode canvas is sized to image (dw x dh) and positioned at (cx,cy) in stage.
// Click at (canvasX, canvasY) maps to image pixel (canvasX/s, canvasY/s).
// In zoom mode we want that image pixel at the same screen position.
// Screen position = canvas.left + canvasX = cx + canvasX
// In zoom 1:1: image pixel imgX is at stage position = (sw-iw)/2 + panX + imgX
// So: cx + canvasX = (sw-iw)/2 + panX + canvasX/s
// panX = cx + canvasX - (sw-iw)/2 - canvasX/s
function zoomToPoint(canvasX, canvasY) {
  if (!mImg) return;
  const s  = mCanvas._s  || 1;
  const cx = mCanvas._cx || 0, cy = mCanvas._cy || 0;
  const iw = mImg.naturalWidth, ih = mImg.naturalHeight;
  const sw = mStage.clientWidth,  sh = mStage.clientHeight;
  panX = cx + canvasX - (sw-iw)/2 - canvasX/s;
  panY = cy + canvasY - (sh-ih)/2 - canvasY/s;
  isZoomed = true;
  renderMuseum();
}

function resetToFit() { isZoomed=false; panX=0; panY=0; renderMuseum(); }

function loadMuseumImage(idx) {
  mIdx = idx;
  mCounter.textContent = String(idx+1).padStart(2,'0')+' / '+String(IMAGES.length).padStart(2,'0');
  document.getElementById('captionTitle').textContent = IMAGES[idx].title;
  document.getElementById('captionDesc').textContent  = IMAGES[idx].desc;
  document.getElementById('captionMeta').textContent  = IMAGES[idx].meta;
  mImg = loadedImgs[idx];
  if (mImg.complete) renderMuseum(); else mImg.onload = renderMuseum;
}

function openMuseum(idx) {
  isZoomed=false; panX=0; panY=0;
  museum.classList.add('open');
  requestAnimationFrame(() => loadMuseumImage(idx));
}
function closeMuseum() { museum.classList.remove('open'); cursorLeave(); }

mClose.addEventListener('click', closeMuseum);
mReset.addEventListener('click', resetToFit);
mPrev.addEventListener('click', () => { if(slideAnim) return; resetToFit(); slideToImage((mIdx-1+IMAGES.length)%IMAGES.length,-1); });
mNext.addEventListener('click', () => { if(slideAnim) return; resetToFit(); slideToImage((mIdx+1)%IMAGES.length,1); });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (museum.classList.contains('open'))         { closeMuseum();  return; }
    if (galleryOverlay.classList.contains('open')) { closeGallery(); return; }
    if (contactOverlay.classList.contains('open')) { closeContact(); return; }
    return;
  }
  if (!museum.classList.contains('open')) return;
  if (e.key==='ArrowRight'&&!slideAnim){ resetToFit(); slideToImage((mIdx+1)%IMAGES.length,1); }
  if (e.key==='ArrowLeft' &&!slideAnim){ resetToFit(); slideToImage((mIdx-1+IMAGES.length)%IMAGES.length,-1); }
});

// Mouse
mCanvas.addEventListener('mousedown', e => {
  didPan=false; lastX=e.clientX; lastY=e.clientY;
  if (isZoomed) isDragging=true;
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  if (Math.abs(dx)>2||Math.abs(dy)>2) { didPan=true; mCanvas.className='grabbing'; }
  panX+=dx; panY+=dy; lastX=e.clientX; lastY=e.clientY; renderMuseum();
});
window.addEventListener('mouseup', () => {
  isDragging=false;
  if (isZoomed) mCanvas.className='zoomed';
  setTimeout(()=>{ didPan=false; },0);
});
mCanvas.addEventListener('click', e => {
  if (didPan) return;
  const r = mCanvas.getBoundingClientRect();
  if (!isZoomed) zoomToPoint(e.clientX-r.left, e.clientY-r.top);
  else resetToFit();
});

// Touch
let lastT=null, tsX=0, tsY=0;
mCanvas.addEventListener('touchstart', e => {
  e.preventDefault(); lastT=e.touches; didPan=false; tsX=e.touches[0].clientX; tsY=e.touches[0].clientY;
},{passive:false});
mCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length!==1) return;
  const dx=e.touches[0].clientX-lastT[0].clientX, dy=e.touches[0].clientY-lastT[0].clientY;
  if (Math.abs(dx)>3||Math.abs(dy)>3) didPan=true;
  if (isZoomed){ panX+=dx; panY+=dy; renderMuseum(); }
  lastT=e.touches;
},{passive:false});
mCanvas.addEventListener('touchend', e => {
  e.preventDefault();
  const dx=e.changedTouches[0].clientX-tsX, dy=e.changedTouches[0].clientY-tsY;
  const swipe=Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5;
  if (!didPan&&!swipe){
    const r=mCanvas.getBoundingClientRect(), t=e.changedTouches[0];
    if (!isZoomed) zoomToPoint(t.clientX-r.left, t.clientY-r.top); else resetToFit();
  } else if(swipe&&!isZoomed&&!slideAnim){
    if(dx<0) slideToImage((mIdx+1)%IMAGES.length,1); else slideToImage((mIdx-1+IMAGES.length)%IMAGES.length,-1);
  }
  setTimeout(()=>{ didPan=false; },0);
},{passive:false});

window.addEventListener('resize', () => { if(museum.classList.contains('open')) renderMuseum(); });

// CONTACT
const contactOverlay = document.getElementById('contactOverlay');
const contactForm    = document.getElementById('contactForm');
const formSubmitBtn  = document.getElementById('formSubmitBtn');
const formStatus     = document.getElementById('formStatus');

function openContact() {
  if (museum.classList.contains('open')) closeMuseum();
  contactOverlay.classList.add('open');
  mainHeader.classList.add('solid');
  clearInterval(heroTimer);
  setNav(document.getElementById('navContact'));
}
function closeContact() {
  contactOverlay.classList.remove('open');
  if (!galleryOverlay.classList.contains('open')) mainHeader.classList.remove('solid');
  startTimer();
  setNav(document.getElementById('navWork'));
}
document.getElementById('navContact').addEventListener('click', e => { e.preventDefault(); contactOverlay.classList.contains('open') ? closeContact() : openContact(); });
document.getElementById('contactBack').addEventListener('click', closeContact);

contactForm.addEventListener('submit', async e => {
  e.preventDefault();
  const name    = document.getElementById('cf-name').value.trim();
  const email   = document.getElementById('cf-email').value.trim();
  const message = document.getElementById('cf-message').value.trim();
  if (!name||!email||!message){ setStatus('Please fill in all fields.','err'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ setStatus('Please enter a valid email address.','err'); return; }
  formSubmitBtn.classList.add('loading'); formSubmitBtn.disabled=true; setStatus('','');
  try {
    const res = await fetch('https://formspree.io/f/xgonqrbv',{
      method:'POST', headers:{'Accept':'application/json','Content-Type':'application/json'},
      body:JSON.stringify({name,email,message})
    });
    if(res.ok){ setStatus('Message sent \u2014 thank you.','ok'); contactForm.reset(); }
    else setStatus('Something went wrong. Try again.','err');
  } catch { setStatus('Network error. Try again.','err'); }
  finally { formSubmitBtn.classList.remove('loading'); formSubmitBtn.disabled=false; }
});
function setStatus(msg,type){
  formStatus.textContent=msg;
  formStatus.className='form-status'+(msg?' visible':'')+(type?' '+type:'');
}

// MANIFEST
function initFromManifest(manifest) {
  const sid = manifest.site.hero && manifest.site.hero.seriesId;
  const series = (sid ? manifest.series.find(s => s.id === sid) : null) || manifest.series[0];
  if (!series) return;
  IMAGES = series.images.map(img => ({
    src:   img.filename,
    title: img.title,
    desc:  img.description || '',
    meta:  img.meta || ''
  }));
  loadedImgs = IMAGES.map(d => { const i = new Image(); i.src = d.src; return i; });
  document.getElementById('heroSeries').textContent = series.subtitle || '';
  document.getElementById('heroTitle').textContent  = series.title    || '';
  document.getElementById('seriesBarTitle').textContent = series.title    || '';
  document.getElementById('seriesBarMeta').textContent  = series.subtitle || '';
  buildHeroDots();
  initHero();
  buildGalleryGrid();
}
fetch('manifest.json')
  .then(r => { if (!r.ok) throw new Error('manifest.json not found'); return r.json(); })
  .then(initFromManifest)
  .catch(err => console.error('Gallery init error:', err));
