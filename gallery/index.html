<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Andrea Spinazzola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--fg:#111111;--fg2:#888888;--fg3:#cccccc;--border:#e4e4e4;--h:48px;--ease:cubic-bezier(0.16,1,0.3,1)}
[data-theme="dark"]{--bg:#0d0d0d;--fg:#efefef;--fg2:#666666;--fg3:#2a2a2a;--border:#1e1e1e}
html{height:100%;background:var(--bg)}
body{height:100%;font-family:'Hanken Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg);-webkit-user-select:none;user-select:none;overflow:hidden;transition:background .4s,color .4s;-webkit-tap-highlight-color:transparent}
header{position:fixed;top:0;left:0;right:0;z-index:900;height:var(--h);display:flex;align-items:center;padding:0 20px;background:transparent;border-bottom:1px solid transparent;transition:background .45s,border-color .45s}
header.solid{background:var(--bg);border-bottom-color:var(--border)}
.h-name{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#fff;margin-right:auto;transition:color .4s;white-space:nowrap}
header.solid .h-name{color:var(--fg)}
nav{display:flex;align-items:stretch;height:var(--h)}
nav a{font-size:10px;font-weight:400;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.6);text-decoration:none;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;white-space:nowrap}
nav a:hover,nav a.active{color:#fff}
nav a.active{border-bottom-color:rgba(255,255,255,.55)}
header.solid nav a{color:var(--fg2)}
header.solid nav a:hover,header.solid nav a.active{color:var(--fg)}
header.solid nav a.active{border-bottom-color:var(--fg)}
@media(max-width:540px){nav a:not(.active){display:none}nav a.active{padding:0 10px}}
.h-right{display:flex;align-items:center;margin-left:8px;padding-left:14px;border-left:1px solid rgba(255,255,255,.18);height:var(--h);transition:border-color .4s}
header.solid .h-right{border-left-color:var(--border)}
.theme-btn{background:none;border:none;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);padding:0;transition:color .2s;touch-action:manipulation}
.theme-btn:hover,header.solid .theme-btn:hover{color:var(--fg)}
header.solid .theme-btn{color:var(--fg2)}
.theme-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.hero{position:fixed;inset:0;z-index:0}
#hero-canvas,#hero-canvas-b{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
#hero-canvas-b{opacity:0}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,rgba(0,0,0,.15) 50%,rgba(0,0,0,.06) 100%);pointer-events:none}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:0 6vw clamp(28px,5vw,56px)}
.hero-series{font-family:'Space Mono',monospace;font-size:clamp(7px,1.8vw,9px);letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:10px}
.hero-title{font-weight:700;font-size:clamp(3.8rem,13vw,12.5rem);line-height:.88;color:#fff;text-transform:uppercase;letter-spacing:-.02em;margin-bottom:clamp(20px,3.5vw,48px)}
.hero-enter{display:inline-flex;align-items:center;gap:10px;font-size:clamp(9px,1.8vw,11px);font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.65);cursor:pointer;border:none;background:none;padding:0;transition:color .2s;touch-action:manipulation}
.hero-enter:hover{color:#fff}
.hero-enter svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.hero-dots{position:absolute;bottom:clamp(14px,2.5vw,26px);right:clamp(16px,3vw,28px);display:flex;gap:6px;z-index:5}
.hero-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:background .3s,transform .3s;touch-action:manipulation}
.hero-dot.active{background:#fff;transform:scale(1.5)}
.gallery-overlay,.contact-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;opacity:0;transform:translateY(24px);pointer-events:none;visibility:hidden;transition:opacity .38s var(--ease),transform .38s var(--ease),background .4s,visibility 0s linear .38s}
.gallery-overlay{z-index:999}
.contact-overlay{z-index:999}
.gallery-overlay.open,.contact-overlay.open{opacity:1;transform:translateY(0);pointer-events:auto;visibility:visible;transition:opacity .38s var(--ease),transform .38s var(--ease),background .4s,visibility 0s linear 0s}
.gallery-header,.contact-header{height:var(--h);flex-shrink:0;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);transition:border-color .4s;gap:16px}
.g-back{font-size:10px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;color:var(--fg2);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:7px;transition:color .2s;touch-action:manipulation;padding:8px 0}
.g-back:hover{color:var(--fg)}
.g-back svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.g-header-name{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--fg);margin:0 auto}
.gallery-wall{flex:1;overflow:hidden;transition:background .4s;display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:100px;gap:1px;background:var(--border);padding:1px}
.g-item{position:relative;overflow:hidden;background:var(--bg);transition:background .4s;cursor:pointer}
.g-item canvas{width:100%;height:100%;display:block;will-change:transform;transform-origin:center;transition:transform 1.1s var(--ease)}
.g-item .g-hit{position:absolute;inset:0;z-index:2}
@media(hover:hover){.g-item:hover canvas{transform:scale(1.06)}}
.g-caption{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:52px 18px 18px;background:linear-gradient(to top,rgba(0,0,0,.68) 0%,transparent 100%);display:flex;align-items:flex-end;justify-content:space-between;opacity:0;transform:translateY(12px);transition:opacity .45s var(--ease),transform .45s var(--ease);pointer-events:none}
@media(hover:hover){.g-item:hover .g-caption{opacity:1;transform:translateY(0)}}
@media(hover:none){.g-caption{opacity:1;transform:translateY(0);padding-bottom:14px}}
.g-caption-title{font-size:12px;font-weight:500;letter-spacing:.05em;color:#fff}
.g-caption-index{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.2em;color:rgba(255,255,255,.45);text-transform:uppercase}
.series-bar{height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-top:1px solid var(--border);transition:border-color .4s}
.series-bar-title{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--fg)}
.series-bar-meta{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.18em;color:var(--fg2);text-transform:uppercase}
@media(max-width:480px){.series-bar-meta{display:none}}
.contact-overlay{-webkit-user-select:text;user-select:text}
.contact-body{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;overflow-y:auto}
.contact-inner{width:100%;max-width:480px}
.overlay-close{position:absolute;bottom:20px;left:20px;z-index:10;background:none;border:none;color:var(--fg2);cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;padding:0;transition:color .15s;touch-action:manipulation}
.overlay-wrapper{position:absolute;inset:0;pointer-events:none}
.overlay-wrapper *{pointer-events:auto}
.overlay-close:hover{color:var(--fg)}
.overlay-close svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.contact-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--fg2)}
.contact-form{display:flex;flex-direction:column;gap:0}
.form-field{display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--border);padding:18px 0;transition:border-color .2s}
.form-field:focus-within{border-bottom-color:var(--fg)}
.form-field label{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg2);transition:color .2s;-webkit-user-select:none;user-select:none}
.form-field:focus-within label{color:var(--fg)}
.form-field input,.form-field textarea{background:none;border:none;outline:none;font-family:'Hanken Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;font-weight:400;color:var(--fg);width:100%;resize:none;padding:0;-webkit-user-select:text;user-select:text}
.form-field input::placeholder,.form-field textarea::placeholder{color:var(--fg3)}
.form-field textarea{min-height:100px;line-height:1.6}
.form-submit{margin-top:32px;display:flex;align-items:center;justify-content:space-between}
.form-btn{background:none;border:none;cursor:pointer;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg2);display:flex;align-items:center;gap:10px;padding:0;transition:color .2s;touch-action:manipulation}
.form-btn:hover{color:var(--fg)}
.form-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;transition:transform .3s var(--ease)}
.form-btn:hover svg{transform:translateX(4px)}
.form-btn.loading svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.form-status{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg2);opacity:0;transition:opacity .3s}
.form-status.visible{opacity:1}
.form-status.ok{color:#4a9}
.form-status.err{color:#c55}
.custom-cursor{position:fixed;top:0;left:0;width:40px;height:40px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);opacity:0;transition:opacity .18s}
.custom-cursor.visible{opacity:1}
.custom-cursor.pressed{transform:translate(-50%,-50%) scale(.72)}
.museum{position:relative;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;opacity:0;transform:translateY(24px);pointer-events:none;visibility:hidden;transition:opacity .38s var(--ease),transform .38s var(--ease),background .4s,visibility 0s linear .38s}
.museum.open{opacity:1;transform:translateY(0);pointer-events:auto;visibility:visible;transition:opacity .38s var(--ease),transform .38s var(--ease),background .4s,visibility 0s linear 0s}
.museum-counter{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--fg2);text-transform:uppercase;flex-shrink:0}
.m-btn{background:none;border:none;color:var(--fg2);cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;transition:color .15s;touch-action:manipulation;flex-shrink:0}
.m-btn:hover{color:var(--fg)}
.m-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.museum-stage{flex:1;position:relative;overflow:hidden;padding-top:20px}
#museum-canvas{position:absolute;display:block;cursor:zoom-in}
#museum-canvas.zoomed{cursor:grab}
#museum-canvas.grabbing{cursor:grabbing}
.museum-wm{position:absolute;pointer-events:none;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.2em;color:var(--fg2);text-transform:uppercase;opacity:.45;white-space:nowrap}
.museum-reset{position:absolute;background:none;border:none;color:var(--fg2);cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center;padding:0;opacity:0;pointer-events:none;transition:opacity .2s,color .2s;touch-action:manipulation}
.museum-reset.visible{opacity:.45;pointer-events:auto}
.museum-reset:hover{opacity:1;color:var(--fg)}
.museum-reset svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.m-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:20;background:none;border:none;color:var(--fg);cursor:pointer;width:56px;height:56px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;pointer-events:none;touch-action:manipulation}
.m-arrow svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round}
.m-arrow-left{left:4px}.m-arrow-right{right:4px}
.m-arrow.visible{opacity:.3;pointer-events:auto}
.m-arrow:hover{opacity:1}
@media(hover:none){.m-arrow{opacity:.25!important;pointer-events:auto!important}}
.museum-caption{flex-shrink:0;min-height:52px;display:flex;align-items:center;padding:10px 20px;border-top:1px solid var(--border);gap:24px;transition:border-color .4s;flex-wrap:wrap}
.caption-title{font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--fg);white-space:nowrap;flex-shrink:0}
.caption-body{display:flex;align-items:baseline;gap:24px;flex:1;min-width:0}
.caption-desc{font-size:9px;font-weight:400;line-height:1.55;color:var(--fg2);letter-spacing:.01em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.caption-meta{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.18em;color:var(--fg3);text-transform:uppercase;line-height:1.9;white-space:nowrap;flex-shrink:0}
@media(max-width:480px){.caption-body{flex-direction:column;gap:4px}.caption-meta{display:none}}
.error-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.error-icon{font-size:48px;margin-bottom:24px;opacity:.5}
.error-title{font-size:14px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--fg);margin-bottom:12px}
.error-msg{font-size:11px;color:var(--fg2);line-height:1.6;max-width:400px}
</style>
</head>
<body>
<div class="custom-cursor" id="customCursor"></div>
<header id="mainHeader">
  <div class="h-name" id="siteName">Andrea Spinazzola</div>
  <nav id="mainNav"></nav>
  <div class="h-right">
    <button class="theme-btn" id="themeBtn">
      <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</header>
<div class="hero" id="heroSection">
  <canvas id="hero-canvas-b"></canvas>
  <canvas id="hero-canvas"></canvas>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-series" id="heroSeries"></div>
    <div class="hero-title" id="heroTitle"></div>
    <button class="hero-enter" id="heroEnter"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="9" y1="3" x2="9" y2="21"/></svg>View Series</button>
  </div>
  <div class="hero-dots" id="heroDots"></div>
</div>
<div class="gallery-overlay" id="galleryOverlay">
  <div class="gallery-header">
    <button class="g-back" id="galleryBack"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Back</button>
    <div class="g-header-name" id="galleryHeaderName">Andrea Spinazzola</div>
    <div style="width:60px"></div>
  </div>
  <div class="gallery-wall" id="galleryWall"></div>
  <div class="series-bar">
    <span class="series-bar-title" id="seriesBarTitle"></span>
    <span class="series-bar-meta" id="seriesBarMeta"></span>
  </div>
</div>
<div class="contact-overlay" id="contactOverlay">
  <div class="overlay-wrapper">
    <button class="overlay-close" id="contactClose"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="contact-body">
    <div class="contact-inner">
      <div class="contact-label" style="margin-bottom:32px">Get in touch</div>
      <form class="contact-form" id="contactForm" novalidate>
        <div class="form-field"><label for="cf-name">Name</label><input id="cf-name" name="name" type="text" placeholder="Your name" autocomplete="name" required></div>
        <div class="form-field"><label for="cf-email">Email</label><input id="cf-email" name="email" type="email" placeholder="your@email.com" autocomplete="email" required></div>
        <div class="form-field"><label for="cf-message">Message</label><textarea id="cf-message" name="message" placeholder="Write your message&hellip;" required></textarea></div>
        <div class="form-submit">
          <button class="form-btn" id="formSubmitBtn" type="submit">Send<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
          <span class="form-status" id="formStatus"></span>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="museum" id="museum">
  <div class="overlay-wrapper">
    <button class="overlay-close" id="mClose"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="museum-stage" id="museumStage">
    <canvas id="museum-canvas"></canvas>
    <div class="museum-wm">&copy; Andrea Spinazzola</div>
    <button class="museum-reset" id="museumReset"><svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
    <button class="m-arrow m-arrow-left" id="mPrev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="m-arrow m-arrow-right" id="mNext"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
  <div class="museum-caption">
    <div class="museum-counter" id="museumCounter">01 / 01</div>
    <div class="caption-title" id="captionTitle">&mdash;</div>
    <div class="caption-body">
      <div class="caption-desc" id="captionDesc">&mdash;</div>
      <div class="caption-meta" id="captionMeta">&mdash;</div>
    </div>
  </div>
</div>
<div class="error-overlay" id="errorOverlay" style="display:none;">
  <div class="error-icon">&#9888;</div>
  <div class="error-title">Configuration Error</div>
  <div class="error-msg" id="errorMsg">Unable to load gallery configuration.</div>
</div>
<script>
(function(){
'use strict';
var MANIFEST=null;
var loadedImages=[];
var heroInterval=5000;
var heroIdx=0,heroTimer=null;
var currentSeriesId=null;
var currentSeriesImages=[];
var currentSeriesLoadedImgs=[];
var mImg=null,mIdx=0;
var isZoomed=false,panX=0,panY=0;
var isDragging=false,lastX=0,lastY=0,didPan=false;
var slideAnim=null;
var arrowTimer=null;
var allReady=false;
var pendingCallbacks=[];
function whenReady(fn){if(allReady)fn();else pendingCallbacks.push(fn)}
function flushReadyCallbacks(){allReady=true;pendingCallbacks.forEach(function(fn){fn()});pendingCallbacks=[]}
var heroCanvasA=document.getElementById('hero-canvas');
var heroCanvasB=document.getElementById('hero-canvas-b');
var heroDots=document.getElementById('heroDots');
var galleryWall=document.getElementById('galleryWall');
var galleryOverlay=document.getElementById('galleryOverlay');
var mainHeader=document.getElementById('mainHeader');
var mainNav=document.getElementById('mainNav');
var museum=document.getElementById('museum');
var mStage=document.getElementById('museumStage');
var mCanvas=document.getElementById('museum-canvas');
var mCtx=mCanvas.getContext('2d');
var mWM=document.querySelector('.museum-wm');
var mReset=document.getElementById('museumReset');
var mCounter=document.getElementById('museumCounter');
var mPrev=document.getElementById('mPrev');
var mNext=document.getElementById('mNext');
var mClose=document.getElementById('mClose');
var offCanvas=document.createElement('canvas');
var offCtx=offCanvas.getContext('2d');
function showError(msg){document.getElementById('errorOverlay').style.display='flex';document.getElementById('errorMsg').textContent=msg}
function getAllImages(seriesId){var s=findSeries(seriesId);return s?s.images:[]}
function findSeries(seriesId){return MANIFEST.series.find(function(s){return s.id===seriesId})}
function getHeroSeries(){var heroConfig=MANIFEST.site.hero||{};var sid=heroConfig.seriesId||(MANIFEST.series[0]?MANIFEST.series[0].id:null);return findSeries(sid)}
function buildNav(){mainNav.innerHTML='';MANIFEST.series.forEach(function(series){var a=document.createElement('a');a.href='#';a.dataset.seriesId=series.id;a.textContent=series.title;a.addEventListener('click',function(e){e.preventDefault();if(galleryOverlay.classList.contains('open')&&currentSeriesId===series.id){closeGallery()}else{openGallery(series.id)}});mainNav.appendChild(a)});var aboutLink=document.createElement('a');aboutLink.href='#';aboutLink.textContent='About';aboutLink.addEventListener('click',function(e){e.preventDefault()});mainNav.appendChild(aboutLink);var contactLink=document.createElement('a');contactLink.href='#';contactLink.id='navContact';contactLink.textContent='Contact';contactLink.addEventListener('click',function(e){e.preventDefault();toggleContact()});mainNav.appendChild(contactLink)}
function setNavActive(seriesId){document.querySelectorAll('nav a').forEach(function(a){a.classList.remove('active')});if(seriesId){var active=document.querySelector('nav a[data-series-id="'+seriesId+'"]');if(active)active.classList.add('active')}}

h*s,sh=img.naturalHeight*s;ctx.clearRect(0,0,cv.width,cv.height);ctx.drawImage(img,(cv.width-sw)/2,(cv.height-sh)/2,sw,sh)};if(img.complete){paint()}else{img.onload=paint}new ResizeObserver(paint).observe(item)});galleryWall.style.display='grid';galleryWall.style.gridTemplateColumns='repeat(12, 1fr)';galleryWall.style.gap='1px';galleryWall.style.background='var(--border)'}

function renderMuseum(){if(!mImg)return;var sw=mStage.clientWidth,sh=mStage.clientHeight;var pp=PP();var iw=mImg.naturalWidth,ih=mImg.naturalHeight;if(!iw||!ih)return;if(!isZoomed){var s=Math.min((sw-pp*2)/iw,(sh-pp*2)/ih);var dw=Math.round(iw*s),dh=Math.round(ih*s);var cx=Math.round((sw-dw)/2),cy=Math.round((sh-dh)/2);mCanvas.width=dw;mCanvas.height=dh;mCanvas.style.width=dw+'px';mCanvas.style.height=dh+'px';mCanvas.style.left=cx+'px';mCanvas.style.top=cy+'px';mCtx.clearRect(0,0,dw,dh);mCtx.drawImage(mImg,0,0,dw,dh);mCanvas._s=s;mCanvas._cx=cx;mCanvas._cy=cy;mCanvas._dw=dw;mCanvas._dh=dh;mCanvas.className='';mReset.classList.remove('visible');anchorUI(cx,cy,dw,dh)}else{mCanvas.width=sw;mCanvas.height=sh;mCanvas.style.width=sw+'px';mCanvas.style.height=sh+'px';mCanvas.style.left='0px';mCanvas.style.top='0px';var maxPX=Math.max(0,(iw-sw)/2);var maxPY=Math.max(0,(ih-sh)/2);panX=Math.max(-maxPX,Math.min(maxPX,panX));panY=Math.max(-maxPY,Math.min(maxPY,panY));mCtx.clearRect(0,0,sw,sh);mCtx.drawImage(mImg,Math.round((sw-iw)/2+panX),Math.round((sh-ih)/2+panY),iw,ih);mCanvas.className=isDragging?'grabbing':'zoomed';mReset.classList.add('visible');mWM.style.left='20px';mWM.style.top=(sh-24)+'px';mReset.style.right='16px';mReset.style.top=(sh-30)+'px'}}
function slideToImage(idx,dir){var nextImg=currentSeriesLoadedImgs[idx];var go=function(){if(slideAnim){cancelAnimationFrame(slideAnim);slideAnim=null}var cw=mCanvas.width,ch=mCanvas.height;offCanvas.width=cw;offCanvas.height=ch;offCtx.clearRect(0,0,cw,ch);offCtx.drawImage(mCanvas,0,0);mIdx=idx;mImg=nextImg;mCounter.textContent=String(idx+1).padStart(2,'0')+' / '+String(currentSeriesImages.length).padStart(2,'0');document.getElementById('captionTitle').textContent=currentSeriesImages[idx].title||'';document.getElementById('captionDesc').textContent=currentSeriesImages[idx].description||'';document.getElementById('captionMeta').textContent=currentSeriesImages[idx].meta||'';var iw2=nextImg.naturalWidth,ih2=nextImg.naturalHeight;var s2=Math.min(cw/iw2,ch/ih2);var dw2=Math.round(iw2*s2),dh2=Math.round(ih2*s2);var SHIFT=Math.round(cw*0.04),DUR=480;var start=null;function easeOut(t){return 1-Math.pow(1-t,3)}function frame(ts){if(!start)start=ts;var t=Math.min((ts-start)/DUR,1),e=easeOut(t);mCtx.clearRect(0,0,cw,ch);mCtx.save();mCtx.globalAlpha=1-e;mCtx.drawImage(offCanvas,Math.round(-dir*SHIFT*e),0);mCtx.restore();mCtx.save();mCtx.globalAlpha=e;mCtx.drawImage(nextImg,Math.round((cw-dw2)/2+dir*SHIFT*(1-e)),Math.round((ch-dh2)/2),dw2,dh2);mCtx.restore();if(t<1){slideAnim=requestAnimationFrame(frame)}else{slideAnim=null;renderMuseum()}}slideAnim=requestAnimationFrame(frame)};if(nextImg&&nextImg.complete)go();else if(nextImg)nextImg.onload=go}
